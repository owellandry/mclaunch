name: Dependabot Auto Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Label Dependabot PR
        uses: actions/github-script@v8
        with:
          script: |
            const labels = ['dependabot', 'dependencies'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels,
            });

      - name: Add PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              'This PR was opened by Dependabot.',
              '',
              'Checklist:',
              '- Review changelog / release notes',
              '- Confirm CI is green',
              '- Verify no runtime regressions in launcher, installer, or mod',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
