name: Release Launcher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build Release Assets (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_glob: dist/*.exe
            build_command: pnpm exec electron-builder --win nsis --publish never
          - os: ubuntu-latest
            asset_glob: dist/*.AppImage
            build_command: pnpm exec electron-builder --linux AppImage --publish never
          - os: macos-latest
            asset_glob: dist/*.zip
            build_command: pnpm exec electron-builder --mac zip --publish never

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Validate tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "::error::El tag ${GITHUB_REF_NAME} no coincide con package.json (${expected_tag})."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build launcher
        run: pnpm build

      - name: Package release asset
        shell: bash
        run: ${{ matrix.build_command }}

      - name: Upload build assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.os }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release manifest
        shell: bash
        run: |
          set -euo pipefail
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/create-release-manifest.mjs \
            --assets-dir release-assets \
            --output release-assets/release-manifest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --published-at "${published_at}"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

          gh release upload "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
