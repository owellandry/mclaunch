name: Reporte de Error
description: Reporta un bug, una regresion o un comportamiento inesperado.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: Que ocurrio?
      placeholder: Una descripcion corta y clara del problema.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos Para Reproducir
      description: Explica como reproducirlo.
      placeholder: |
        1. Ve a ...
        2. Haz clic en ...
        3. Observa ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento Esperado
      placeholder: Que debio pasar?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento Actual
      placeholder: Que paso en realidad?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area Afectada
      options:
        - react-ui
        - electron
        - react-installer
        - mc-home-client
        - CI / workflows
        - docs
        - otro
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Entorno
      description: SO, version de la app, version de Node, version de Java o cualquier dato relevante.
      placeholder: Windows 11, Node 20, Java 17, ultima build de la rama...

  - type: textarea
    id: logs
    attributes:
      label: Logs / Capturas
      description: Pega logs o agrega capturas si las tienes.

  - type: checkboxes
    id: checks
    attributes:
      label: Antes De Enviar
      options:
        - label: Revise primero si ya existia un issue parecido.
          required: true
        - label: Quite informacion sensible de logs y capturas.
          required: true
